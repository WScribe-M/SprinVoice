<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Créer un client</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fa; }
        .content { padding: 24px; max-width: 600px; }
        h1 { color: #1d3557; margin-bottom: 20px; }
        h2 { color: #457b9d; font-size: 15px; margin: 20px 0 10px 0; }
        label { display:block; font-size:13px; color:#555; margin-bottom:4px; margin-top:10px; }
        input { width:100%; padding:8px 10px; border:1px solid #ccc; border-radius:4px; font-size:14px; box-sizing:border-box; }
        .error { color:#e63946; margin-bottom:12px; }
        .btn { display:inline-block; padding:9px 20px; border-radius:4px; text-decoration:none; font-size:14px; border:none; cursor:pointer; }
        .btn-primary { background:#1d3557; color:#fff; }
        .btn-secondary { background:#ccc; color:#333; }
    </style>
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>
<div class="content">

<h1>Créer un client</h1>

<div th:if="${error}" th:text="${error}"
     style="background:#fdecea;border:1px solid #f5c6cb;color:#721c24;padding:10px 14px;border-radius:6px;margin-bottom:16px;font-size:13px;"></div>

<form th:action="@{/admin/customers/create}" th:object="${dto}" method="post">

    <h2>Informations client</h2>

    <label>Nom
        <input type="text" th:field="*{name}"/>
    </label>
    <label>Raison sociale
        <input type="text" th:field="*{corporateName}"/>
    </label>
    <label>Adresse
        <input type="text" th:field="*{address}"/>
    </label>
    <label>Code postal
        <input type="text" th:field="*{zipcode}"/>
    </label>
    <label>Ville
        <input type="text" th:field="*{city}"/>
    </label>
    <label>Délai de paiement (jours)
        <input type="number" th:field="*{delay}"/>
    </label>

    <h2>Compte utilisateur</h2>

    <label>Nom d'utilisateur
        <input type="text" th:field="*{username}"/>
    </label>
    <label>Mot de passe
        <input type="password" th:field="*{password}"/>
        <small style="color:#888;font-size:11px;">8 caractères min. · 1 majuscule · 1 chiffre · 1 caractère spécial</small>
    </label>

        <div style="display:flex;gap:10px;margin-top:20px;">
            <button type="submit" class="btn btn-primary">Créer</button>
            <a th:href="@{/admin/customers}" class="btn btn-secondary">Annuler</a>
        </div>
    </form>
</div>
</body>
</html>
