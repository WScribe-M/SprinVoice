<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Modifier un client</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fa; }
        .content { padding: 24px; max-width: 600px; }
        h1 { color: #1d3557; margin-bottom: 20px; }
        .form-group { margin-bottom: 14px; }
        label { display:block; font-size:13px; color:#555; margin-bottom:4px; }
        input { width:100%; padding:8px 10px; border:1px solid #ccc; border-radius:4px; font-size:14px; box-sizing:border-box; }
        .btn { display:inline-block; padding:9px 20px; border-radius:4px; text-decoration:none; font-size:14px; border:none; cursor:pointer; }
        .btn-primary { background:#1d3557; color:#fff; }
        .btn-secondary { background:#ccc; color:#333; }
    </style>
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>
<div class="content">
    <h1>Modifier le client</h1>
    <form th:action="@{/admin/customers/{id}/edit(id=${customer.id})}"
          th:object="${customer}" method="post">
        <div class="form-group">
            <label>Nom</label>
            <input type="text" th:field="*{name}" required/>
        </div>
        <div class="form-group">
            <label>Raison sociale</label>
            <input type="text" th:field="*{corporateName}"/>
        </div>
        <div class="form-group">
            <label>Adresse</label>
            <input type="text" th:field="*{address}"/>
        </div>
        <div class="form-group">
            <label>Code postal</label>
            <input type="text" th:field="*{zipcode}"/>
        </div>
        <div class="form-group">
            <label>Ville</label>
            <input type="text" th:field="*{city}"/>
        </div>
        <div class="form-group">
            <label>Délai de paiement (jours)</label>
            <input type="number" th:field="*{delay}" min="0"/>
        </div>
        <div style="display:flex;gap:10px;margin-top:20px;">
            <button type="submit" class="btn btn-primary">Enregistrer</button>
            <a th:href="@{/admin/customers}" class="btn btn-secondary">Annuler</a>
        </div>
    </form>
</div>
</body>
</html>
