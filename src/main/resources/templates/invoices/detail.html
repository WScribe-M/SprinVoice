<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>Détail facture</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fa; }
        .content { padding: 24px; max-width: 800px; }
        h1 { color: #1d3557; margin-bottom: 4px; }
        .meta { color: #777; font-size: 13px; margin-bottom: 24px; }
        .section { background:#fff; border-radius:6px; box-shadow:0 1px 4px rgba(0,0,0,.08); padding:20px; margin-bottom:20px; }
        .section h2 { color:#1d3557; font-size:16px; margin-bottom:14px; }
        table { width:100%; border-collapse:collapse; }
        th { background:#1d3557; color:#fff; padding:9px 12px; text-align:left; font-size:13px; }
        td { padding:9px 12px; border-bottom:1px solid #eee; font-size:14px; }
        tr:last-child td { border-bottom:none; }
        .total-row td { font-weight:bold; background:#eaf2fb; }
        .btn { display:inline-block; padding:7px 14px; border-radius:4px; text-decoration:none; font-size:13px; border:none; cursor:pointer; }
        .btn-primary  { background:#1d3557; color:#fff; }
        .btn-warning  { background:#f4a261; color:#fff; }
        .btn-danger   { background:#e63946; color:#fff; }
        .btn-secondary{ background:#ccc; color:#333; }
        .add-row-form { display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap; margin-top:14px; padding-top:14px; border-top:1px solid #eee; }
        .add-row-form .fg { display:flex; flex-direction:column; gap:4px; }
        .add-row-form label { font-size:12px; color:#555; }
        .add-row-form select, .add-row-form input { padding:7px 10px; border:1px solid #ccc; border-radius:4px; font-size:13px; }
        .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px 20px; }
        .info-item label { font-size:12px; color:#888; display:block; }
        .info-item span { font-size:14px; color:#222; }
        .badge { display:inline-block; padding:3px 10px; border-radius:12px; font-size:12px; font-weight:bold; }
        .badge-paid   { background:#d4edda; color:#155724; }
        .badge-unpaid { background:#fff3cd; color:#856404; }
    </style>
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>
<div class="content">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:4px;">
        <h1 th:text="'Facture – ' + ${invoice.designation}"></h1>
        <span th:if="${invoice.paidAt != null}" class="badge badge-paid">Payée</span>
        <span th:if="${invoice.paidAt == null}" class="badge badge-unpaid">En attente</span>
    </div>
    <p class="meta">
        Client :
        <strong th:text="${invoice.customer != null} ? ${invoice.customer.name} : '–'"></strong>
        &nbsp;·&nbsp; Créée le :
        <span th:text="${invoice.createdAt != null} ? ${#temporals.format(invoice.createdAt,'dd/MM/yyyy')} : '–'"></span>
    </p>

    <!-- Informations facture -->
    <div class="section">
        <h2>Informations</h2>
        <div class="info-grid">
            <div class="info-item">
                <label>Date de facturation</label>
                <span th:text="${invoice.invoicedAt != null} ? ${#temporals.format(invoice.invoicedAt,'dd/MM/yyyy')} : '–'"></span>
            </div>
            <div class="info-item">
                <label>Date de paiement</label>
                <span th:text="${invoice.paidAt != null} ? ${#temporals.format(invoice.paidAt,'dd/MM/yyyy')} : '–'"></span>
            </div>
            <div class="info-item">
                <label>Délai client (jours)</label>
                <span th:text="${invoice.customer != null} ? ${invoice.customer.delay} : '–'"></span>
            </div>
        </div>
        <div sec:authorize="hasAuthority('ROLE_ADMIN')" style="margin-top:16px;display:flex;gap:8px;">
            <a th:href="@{/admin/invoices/{id}/edit(id=${invoice.id})}" class="btn btn-warning">Modifier</a>
            <a th:href="@{/admin/invoices/{id}/delete(id=${invoice.id})}" class="btn btn-danger"
               onclick="return confirm('Supprimer cette facture ?')">Supprimer</a>
        </div>
    </div>

    <!-- Lignes de facture -->
    <div class="section">
        <h2>Lignes de facturation</h2>
        <table>
            <tr>
                <th>Produit</th>
                <th>Catégorie</th>
                <th>Prix unitaire</th>
                <th>Quantité</th>
                <th>Montant</th>
                <th sec:authorize="hasAuthority('ROLE_ADMIN')"></th>
            </tr>
            <tr th:each="row : ${rows}">
                <td th:text="${row.product.designation}"></td>
                <td th:text="${row.product.category}"></td>
                <td th:text="${#numbers.formatDecimal(row.product.unitPrice, 1, 2)} + ' €'"></td>
                <td th:text="${row.quantity}"></td>
                <td th:text="${#numbers.formatDecimal(row.amount(), 1, 2)} + ' €'"></td>
                <td sec:authorize="hasAuthority('ROLE_ADMIN')">
                    <a th:href="@{/admin/invoices/{iid}/rows/{rid}/delete(iid=${invoice.id},rid=${row.id})}"
                       class="btn btn-danger"
                       onclick="return confirm('Supprimer cette ligne ?')">✕</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(rows)}">
                <td colspan="6" style="text-align:center;color:#999;">Aucune ligne.</td>
            </tr>
            <tr class="total-row" th:if="${!#lists.isEmpty(rows)}">
                <td colspan="4" style="text-align:right;">Total</td>
                <td th:text="${#numbers.formatDecimal(invoice.total(), 1, 2)} + ' €'"></td>
                <td sec:authorize="hasAuthority('ROLE_ADMIN')"></td>
            </tr>
        </table>

        <!-- Formulaire ajout de ligne (admin seulement) -->
        <form sec:authorize="hasAuthority('ROLE_ADMIN')"
              th:action="@{/admin/invoices/{id}/rows/add(id=${invoice.id})}" method="post"
              class="add-row-form">
            <div class="fg">
                <label>Produit</label>
                <select name="productId" required>
                    <option value="">-- Choisir --</option>
                    <option th:each="p : ${products}" th:value="${p.id}"
                            th:text="${p.designation} + ' (' + ${#numbers.formatDecimal(p.unitPrice,1,2)} + ' €)'">
                    </option>
                </select>
            </div>
            <div class="fg">
                <label>Quantité</label>
                <input type="number" name="quantity" value="1" min="1" step="1" style="width:100px;" required/>
            </div>
            <button type="submit" class="btn btn-primary">Ajouter</button>
        </form>
    </div>

    <a th:href="@{/invoices}" class="btn btn-secondary">← Retour à la liste</a>
</div>
</body>
</html>
