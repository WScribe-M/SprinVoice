<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>Factures</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fa; }
        .content { padding: 24px; }
        h1 { color: #1d3557; margin-bottom: 4px; }
        .subtitle { color: #777; font-size: 13px; margin-bottom: 20px; }
        .summary { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
        .summary-card { background: #fff; border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,.08); padding: 14px 20px; min-width: 140px; }
        .summary-card .value { font-size: 22px; font-weight: bold; color: #1d3557; }
        .summary-card .label { font-size: 12px; color: #888; margin-top: 2px; }
        .summary-card.unpaid .value { color: #856404; }
        .summary-card.paid .value { color: #155724; }
        .btn { display:inline-block; padding:8px 16px; border-radius:4px; text-decoration:none; font-size:14px; }
        .btn-primary  { background:#1d3557; color:#fff; }
        .btn-warning  { background:#f4a261; color:#fff; }
        .btn-danger   { background:#e63946; color:#fff; }
        .btn-info     { background:#457b9d; color:#fff; }
        table { width:100%; border-collapse:collapse; background:#fff; border-radius:6px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.08); margin-top:16px; }
        th { background:#1d3557; color:#fff; padding:10px 14px; text-align:left; font-size:13px; }
        td { padding:10px 14px; border-bottom:1px solid #eee; font-size:14px; }
        tr:last-child td { border-bottom: none; }
        .actions { display:flex; gap:8px; }
        .badge { display:inline-block; padding:3px 10px; border-radius:10px; font-size:12px; font-weight:bold; }
        .badge-paid   { background:#d4edda; color:#155724; }
        .badge-unpaid { background:#fff3cd; color:#856404; }
        .badge-overdue { background:#f8d7da; color:#721c24; }
        .amount { font-weight: bold; }
    </style>
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>
<div class="content">

    <!-- Titre selon le rôle -->
    <h1 sec:authorize="hasAuthority('ROLE_ADMIN')">Toutes les factures</h1>
    <h1 sec:authorize="!hasAuthority('ROLE_ADMIN')">Mes factures</h1>

    <!-- Résumé (client uniquement) -->
    <div sec:authorize="!hasAuthority('ROLE_ADMIN')" class="summary">
        <div class="summary-card">
            <div class="value" th:text="${invoices.size()}">0</div>
            <div class="label">Total factures</div>
        </div>
        <div class="summary-card unpaid">
            <div class="value" th:text="${#lists.size(invoices.?[paidAt == null])}">0</div>
            <div class="label">En attente de paiement</div>
        </div>
        <div class="summary-card paid">
            <div class="value" th:text="${#lists.size(invoices.?[paidAt != null])}">0</div>
            <div class="label">Payées</div>
        </div>
    </div>

    <a sec:authorize="hasAuthority('ROLE_ADMIN')" th:href="@{/admin/invoices/new}" class="btn btn-primary">+ Nouvelle facture</a>

    <table>
        <tr>
            <th>N°</th>
            <th>Désignation</th>
            <th sec:authorize="hasAuthority('ROLE_ADMIN')">Client</th>
            <th>Créée le</th>
            <th>Statut</th>
            <th>Total HT</th>
            <th>Actions</th>
        </tr>
        <tr th:each="invoice : ${invoices}">
            <td style="font-weight:bold;color:#1d3557;white-space:nowrap;"
                th:text="${invoice.invoiceNumber} ?: '–'"></td>
            <td th:text="${invoice.designation}"></td>
            <td sec:authorize="hasAuthority('ROLE_ADMIN')"
                th:text="${invoice.customer != null} ? ${invoice.customer.name} : '–'"></td>
            <td th:text="${invoice.createdAt != null} ? ${#temporals.format(invoice.createdAt,'dd/MM/yyyy')} : '–'"></td>
            <td>
                <span th:if="${invoice.paidAt != null}" class="badge badge-paid">Payée</span>
                <span th:if="${invoice.paidAt == null and invoice.invoicedAt != null and invoice.customer != null and invoice.invoicedAt.plusDays(invoice.customer.delay).isBefore(T(java.time.LocalDateTime).now())}"
                    class="badge badge-overdue">En retard</span>
                <span th:if="${invoice.paidAt == null and !(invoice.invoicedAt != null and invoice.customer != null and invoice.invoicedAt.plusDays(invoice.customer.delay).isBefore(T(java.time.LocalDateTime).now()))}"
                    class="badge badge-unpaid">En attente</span>
            </td>
            <td class="amount" th:text="${#numbers.formatDecimal(invoice.total(), 1, 2)} + ' €'"></td>
            <td class="actions">
                <a th:href="@{/invoices/{id}(id=${invoice.id})}" class="btn btn-info">Voir</a>
                <a sec:authorize="hasAuthority('ROLE_ADMIN')"
                   th:href="@{/admin/invoices/{id}/edit(id=${invoice.id})}" class="btn btn-warning">Modifier</a>
                <form sec:authorize="hasAuthority('ROLE_ADMIN')"
                      th:action="@{/admin/invoices/{id}/delete(id=${invoice.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-danger"
                            onclick="return confirm('Supprimer cette facture ?')">Supprimer</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(invoices)}">
            <td colspan="7" style="text-align:center;color:#999;padding:24px;">Aucune facture.</td>
        </tr>
    </table>
</div>
</body>
</html>
