<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Devis</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fa; }
        .content { padding: 24px; max-width: 700px; }
        h1 { color: #1d3557; margin-bottom: 20px; }
        .form-group { margin-bottom: 14px; }
        label { display:block; font-size:13px; color:#555; margin-bottom:4px; }
        input, select { width:100%; padding:8px 10px; border:1px solid #ccc; border-radius:4px; font-size:14px; box-sizing:border-box; }
        .section { background:#fff; border-radius:6px; box-shadow:0 1px 4px rgba(0,0,0,.08); padding:18px 20px; margin-bottom:18px; }
        .section-title { color:#1d3557; font-size:15px; font-weight:bold; margin:0 0 14px 0; }
        .row-item { display:flex; gap:10px; align-items:center; margin-bottom:8px; }
        .row-item select { flex:1; }
        .row-item input[type="number"] { width:80px; flex:none; }
        .btn { display:inline-block; padding:8px 16px; border-radius:4px; text-decoration:none; font-size:14px; border:none; cursor:pointer; }
        .btn-primary   { background:#1d3557; color:#fff; }
        .btn-secondary { background:#ccc; color:#333; }
        .btn-danger    { background:#e63946; color:#fff; }
        .btn-outline   { background:#fff; color:#1d3557; border:1px solid #1d3557; }
        .btn-sm { padding:5px 10px; font-size:12px; }
        .add-btn { margin-top:8px; }
        .qty-label { font-size:13px; color:#555; white-space:nowrap; }
    </style>
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>
<div class="content">
    <h1 th:text="${dto.id != 0} ? 'Modifier le devis' : 'Nouveau devis'"></h1>
    <form th:action="@{/admin/quotes/save}" th:object="${dto}" method="post">
        <input type="hidden" th:field="*{id}"/>

        <!-- Informations générales -->
        <div class="section">
            <div class="section-title">Informations</div>
            <div class="form-group">
                <label>Client</label>
                <select th:field="*{customerId}" required>
                    <option value="0">-- Sélectionner un client --</option>
                    <option th:each="c : ${customers}"
                            th:value="${c.id}"
                            th:text="${c.name} + ' – ' + ${c.corporateName}">
                    </option>
                </select>
            </div>
            <div class="form-group">
                <label>Désignation</label>
                <input type="text" th:field="*{designation}" required/>
            </div>
            <div class="form-group">
                <label>Date d'expiration</label>
                <input type="date" th:field="*{expiresAt}"/>
            </div>
            <div class="form-group" th:if="${dto.id != 0}">
                <label>Statut</label>
                <select th:field="*{status}">
                    <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.name()}"></option>
                </select>
            </div>
        </div>

        <!-- Lignes de produits (dynamique JS) -->
        <div class="section">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
                <div class="section-title" style="margin:0;">Produits</div>
                <button type="button" onclick="addRow()" class="btn btn-outline btn-sm">+ Ajouter un produit</button>
            </div>
            <div id="rows-container"></div>
            <p id="no-rows-msg" style="color:#999;font-size:13px;margin:0;">Aucun produit ajouté.</p>
        </div>

        <!-- Select template (caché, cloné par JS) -->
        <select id="product-template" style="display:none" disabled>
            <option value="0">-- Choisir un produit --</option>
            <option th:each="p : ${products}"
                    th:value="${p.id}"
                    th:text="${p.designation} + ' (' + ${#numbers.formatDecimal(p.unitPrice,1,2)} + ' €)'">
            </option>
        </select>

        <div style="display:flex;gap:10px;margin-top:4px;">
            <button type="submit" class="btn btn-primary">Enregistrer</button>
            <a th:href="@{/quotes}" class="btn btn-secondary">Annuler</a>
        </div>
    </form>
</div>

<script th:inline="javascript">
/*<![CDATA[*/
const existingRows = /*[[${dto.rows}]]*/ [];

function updateNoRowsMsg() {
    const container = document.getElementById('rows-container');
    document.getElementById('no-rows-msg').style.display =
        container.children.length === 0 ? 'block' : 'none';
}

function addRow(productId, quantity) {
    const container = document.getElementById('rows-container');
    const index = container.children.length;

    const div = document.createElement('div');
    div.className = 'row-item';

    const template = document.getElementById('product-template');
    const select = template.cloneNode(true);
    select.id = '';
    select.style.display = '';
    select.disabled = false;
    select.name = 'rows[' + index + '].productId';
    select.required = true;
    if (productId) select.value = productId;

    const qtyLabel = document.createElement('span');
    qtyLabel.className = 'qty-label';
    qtyLabel.textContent = 'Qté :';

    const qty = document.createElement('input');
    qty.type = 'number';
    qty.name = 'rows[' + index + '].quantity';
    qty.value = quantity || 1;
    qty.min = 1;
    qty.required = true;

    const removeBtn = document.createElement('button');
    removeBtn.type = 'button';
    removeBtn.textContent = '✕';
    removeBtn.className = 'btn btn-danger btn-sm';
    removeBtn.onclick = function() { div.remove(); reindex(); updateNoRowsMsg(); };

    div.appendChild(select);
    div.appendChild(qtyLabel);
    div.appendChild(qty);
    div.appendChild(removeBtn);
    container.appendChild(div);
    updateNoRowsMsg();
}

function reindex() {
    document.querySelectorAll('#rows-container .row-item').forEach(function(row, i) {
        row.querySelector('select').name = 'rows[' + i + '].productId';
        row.querySelector('input[type="number"]').name = 'rows[' + i + '].quantity';
    });
}

if (existingRows && existingRows.length > 0) {
    existingRows.forEach(function(r) { addRow(r.productId, r.quantity); });
}
updateNoRowsMsg();
/*]]>*/
</script>
</body>
</html>
