<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>Devis</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fa; }
        .content { padding: 24px; }
        h1 { color: #1d3557; margin-bottom: 4px; }
        .subtitle { color: #777; font-size: 13px; margin-bottom: 20px; }
        .btn { display:inline-block; padding:8px 16px; border-radius:4px; text-decoration:none; font-size:14px; }
        .btn-primary  { background:#1d3557; color:#fff; }
        .btn-warning  { background:#f4a261; color:#fff; }
        .btn-danger   { background:#e63946; color:#fff; }
        .btn-info     { background:#457b9d; color:#fff; }
        table { width:100%; border-collapse:collapse; background:#fff; border-radius:6px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.08); margin-top:16px; }
        th { background:#1d3557; color:#fff; padding:10px 14px; text-align:left; font-size:13px; }
        td { padding:10px 14px; border-bottom:1px solid #eee; font-size:14px; }
        tr:last-child td { border-bottom: none; }
        .actions { display:flex; gap:8px; }
        .badge { display:inline-block; padding:3px 10px; border-radius:10px; font-size:12px; font-weight:bold; }
        .badge-brouillon { background:#e9ecef; color:#495057; }
        .badge-envoye    { background:#cce5ff; color:#004085; }
        .badge-accepte   { background:#d4edda; color:#155724; }
        .badge-refuse    { background:#f8d7da; color:#721c24; }
        .badge-converti  { background:#e2d9f3; color:#4a235a; }
        .amount { font-weight: bold; }
    </style>
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>
<div class="content">

    <h1 sec:authorize="hasAuthority('ROLE_ADMIN')">Tous les devis</h1>
    <h1 sec:authorize="!hasAuthority('ROLE_ADMIN')">Mes devis</h1>

    <a sec:authorize="hasAuthority('ROLE_ADMIN')" th:href="@{/admin/quotes/new}" class="btn btn-primary" style="margin-bottom:8px;display:inline-block;">+ Nouveau devis</a>

    <table>
        <tr>
            <th>Désignation</th>
            <th sec:authorize="hasAuthority('ROLE_ADMIN')">Client</th>
            <th>Créé le</th>
            <th>Expire le</th>
            <th>Statut</th>
            <th>Total</th>
            <th>Actions</th>
        </tr>
        <tr th:each="quote : ${quotes}">
            <td th:text="${quote.designation}"></td>
            <td sec:authorize="hasAuthority('ROLE_ADMIN')"
                th:text="${quote.customer != null} ? ${quote.customer.name} : '–'"></td>
            <td th:text="${quote.createdAt != null} ? ${#temporals.format(quote.createdAt,'dd/MM/yyyy')} : '–'"></td>
            <td th:text="${quote.expiresAt != null} ? ${#temporals.format(quote.expiresAt,'dd/MM/yyyy')} : '–'"></td>
            <td>
                <span th:if="${quote.status == T(fr.manu.sprinvoice.models.QuoteStatus).BROUILLON}" class="badge badge-brouillon">Brouillon</span>
                <span th:if="${quote.status == T(fr.manu.sprinvoice.models.QuoteStatus).ENVOYE}"    class="badge badge-envoye">Envoyé</span>
                <span th:if="${quote.status == T(fr.manu.sprinvoice.models.QuoteStatus).ACCEPTE}"   class="badge badge-accepte">Accepté</span>
                <span th:if="${quote.status == T(fr.manu.sprinvoice.models.QuoteStatus).REFUSE}"    class="badge badge-refuse">Refusé</span>
                <span th:if="${quote.status == T(fr.manu.sprinvoice.models.QuoteStatus).CONVERTI}"  class="badge badge-converti">Converti</span>
                <span th:if="${quote.status == null}" class="badge badge-brouillon">Brouillon</span>
            </td>
            <td class="amount" th:text="${#numbers.formatDecimal(quote.total(), 1, 2)} + ' €'"></td>
            <td class="actions">
                <a th:href="@{/quotes/{id}(id=${quote.id})}" class="btn btn-info">Voir</a>
                <a sec:authorize="hasAuthority('ROLE_ADMIN')"
                   th:href="@{/admin/quotes/{id}/edit(id=${quote.id})}" class="btn btn-warning">Modifier</a>
                <form sec:authorize="hasAuthority('ROLE_ADMIN')"
                      th:action="@{/admin/quotes/{id}/delete(id=${quote.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-danger"
                            onclick="return confirm('Supprimer ce devis ?')">Supprimer</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(quotes)}">
            <td colspan="7" style="text-align:center;color:#999;padding:24px;">Aucun devis.</td>
        </tr>
    </table>
</div>
</body>
</html>
